<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>脑控游戏平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* ========== 全屏切换按钮 ========== */
        .fullscreen-toggle {
            position: fixed;
            top: 8px;
            right: 12px;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid #888;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fullscreen-toggle:hover {
            background: #ff9800;
            border-color: #ff9800;
        }

        /* ========== 主容器 ========== */
        .container {
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            max-width: 1600px;
        }
        header h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 15px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px #000;
        }
        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        .canvas-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            background-color: #111;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 2px solid #ff9800;
            border-bottom: none;
            width: 800px;
            height: 800px;
            display: block;
        }
        /* 刺激 Canvas — 独立于 .container，全屏时固定底部 */
        #stimCanvas {
            background-color: transparent;
            border-radius: 0 0 20px 20px;
            border: 2px solid #ff9800;
            border-top: none;
            width: 800px;
            height: 180px;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .maze-controls-container {
            width: 800px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 10px;
            backdrop-filter: blur(4px);
        }
        .maze-controls-container label { color: white; font-size: 14px; margin-right: 5px; }
        .maze-controls-container input {
            width: 70px; padding: 6px; border-radius: 8px; border: none; text-align: center; background: #fff;
        }
        .maze-controls-container button {
            background: #ff9800; border: none; color: white; padding: 6px 16px;
            font-size: 1rem; border-radius: 40px; cursor: pointer; font-weight: bold; margin: 0; width: auto;
        }
        .maze-controls-container button:hover { background: #ff5722; transform: scale(1.02); }
        .control-panel {
            background: rgba(0,0,0,0.6); border-radius: 20px; padding: 15px;
            width: 320px; color: white; text-align: center; display: flex; flex-direction: column; gap: 10px;
        }
        .mode-selector { display: flex; gap: 10px; }
        .mode-selector button {
            flex: 1; background: #2c3e66; border: none; color: white; padding: 8px 0;
            font-size: 1rem; border-radius: 40px; cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .mode-selector button.active { background: #ff9800; box-shadow: 0 0 10px #ff9800; }
        .game-selector { display: flex; gap: 10px; }
        .game-selector button {
            flex: 1; background: #2c3e66; border: none; color: white; padding: 8px 0;
            font-size: 1rem; border-radius: 40px; cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .game-selector button.active { background: #ff9800; box-shadow: 0 0 10px #ff9800; }
        .confidence-panel { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; }
        .confidence-panel h3 { margin-bottom: 10px; font-size: 1rem; }
        .bars { display: flex; flex-direction: column; gap: 8px; }
        .bar-item { display: flex; align-items: center; gap: 8px; }
        .dir { width: 30px; text-align: center; font-weight: bold; }
        .bar-container { background: #333; border-radius: 10px; height: 20px; flex: 1; overflow: hidden; }
        .bar { background: #4caf50; width: 0%; height: 100%; transition: width 0.1s ease; }
        .bar-item span:last-child { width: 40px; text-align: right; font-family: monospace; }
        .info { background: #000000aa; padding: 8px; border-radius: 15px; font-size: 0.9rem; }
        .key-hint { font-size: 11px; color: #aaa; }
        .demo-controls, .realtime-controls, .eval-controls { display: flex; gap: 10px; }
        .demo-controls button, .realtime-controls button, .eval-controls button { flex: 1; margin-top: 0; }
        .demo-result-panel { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; text-align: left; }
        .demo-result-panel h3 { margin: 0 0 8px 0; font-size: 1rem; text-align: center; }
        #demo-log {
            background: #1e1e1e; color: #0f0; font-family: monospace; font-size: 11px;
            padding: 6px; border-radius: 8px; height: 130px; overflow-y: auto; margin-bottom: 6px; white-space: pre-wrap;
        }
        #demo-summary { font-size: 12px; text-align: center; background: #00000088; padding: 4px; border-radius: 8px; }
        #demo-progress { font-size: 12px; text-align: center; margin-top: 4px; }
        #eval-info {
            margin-top: 8px; font-size: 14px; color: #ffcc00; display: none;
            text-align: center; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 8px;
        }
        footer { text-align: center; color: #ccc; margin-top: 20px; font-size: 0.8rem; }
        .eval-controls { border-top: 1px solid #555; padding-top: 10px; margin-top: 5px; }
        .eval-controls button#btn-eval-start { background: #ff9800; }
        .eval-controls button#btn-eval-stop { background: #f44336; }
        .eval-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        #demo-log, #demo-summary, #demo-progress {
            user-select: text !important;
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
        }

        /* ================================================================
           全屏模式 — 使用 position:fixed 精确定位，不依赖 DOM 顺序
           布局: 顶栏(36px) + 中间(游戏左+侧边栏右) + 底部刺激(26vh)
           ================================================================ */
        body.fullscreen {
            background: #0a0a0a;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        /* ---- 全屏标题栏 (fixed top) ---- */
        body.fullscreen .fullscreen-header {
            display: flex !important;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 36px;
            padding: 0 16px;
            background: #111;
            border-bottom: 1px solid #333;
            z-index: 100;
            align-items: center;
            justify-content: space-between;
        }
        body.fullscreen .fullscreen-header h1 {
            font-size: 1rem;
            color: #aaa;
            margin: 0;
            font-weight: normal;
        }
        body.fullscreen .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ---- 游戏主容器 (fixed, 左上区域) ---- */
        body.fullscreen .container {
            position: fixed;
            top: 36px;
            left: 0;
            right: 0;
            bottom: 22vh;        /* 给刺激块留空间 */
            background: transparent;
            box-shadow: none;
            backdrop-filter: none;
            border-radius: 0;
            padding: 0;
            max-width: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.fullscreen header {
            display: none;
        }
        body.fullscreen .game-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        body.fullscreen .canvas-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        body.fullscreen #gameCanvas {
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        body.fullscreen .maze-controls-container {
            display: flex !important;
            flex-direction: column;
            position: fixed;
            top: 36px;
            right: 2vw;
            width: clamp(160px, 18vw, 240px);
            bottom: 22vh;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 1.5vh;
            background: rgba(255,255,255,0.03);
            border-left: 1px solid #2a2a2a;
            border-radius: 0;
            padding: 2vw 1.5vw;
            z-index: 50;
        }
        body.fullscreen .maze-controls-container label {
            color: #aaa;
            font-size: clamp(11px, 1.2vmin, 15px);
        }
        body.fullscreen .maze-controls-container input {
            width: 100%;
            font-size: clamp(12px, 1.4vmin, 17px);
            padding: 0.6vh 0.5vw;
        }
        body.fullscreen .maze-controls-container button {
            width: 100%;
            font-size: clamp(12px, 1.4vmin, 17px);
            padding: 0.8vh 1vw;
        }
        body.fullscreen footer {
            display: none;
        }

        /* ---- 底部由 PsychoPy 置顶覆盖，隐藏浏览器 Canvas ---- */
        body.fullscreen #stimCanvas {
            display: none;
        }

        /* ---- 浮动控制面板（vw/vh 自适应缩放）---- */
        body.fullscreen .control-panel {
            position: fixed;
            top: 44px;
            left: 1vw;
            z-index: 2000;
            width: auto;
            max-width: 22vw;
            font-size: clamp(11px, 1.4vmin, 18px);
            padding: 1vw 1.2vw;
            gap: 0.4vw;
            border-radius: 1vw;
            background: rgba(20,20,20,0.92);
            opacity: 0.75;
            transition: opacity 0.3s;
        }
        body.fullscreen .control-panel button {
            font-size: clamp(11px, 1.3vmin, 16px);
            padding: 0.5vh 1vw;
        }
        body.fullscreen .confidence-panel h3 {
            font-size: clamp(12px, 1.6vmin, 20px);
            margin-bottom: 0.5vh;
        }
        body.fullscreen .bar-item .dir {
            font-size: clamp(14px, 2vmin, 26px);
            width: clamp(24px, 3vmin, 40px);
        }
        body.fullscreen .bar-container {
            height: clamp(14px, 2vmin, 24px);
        }
        body.fullscreen .bar-item span:last-child {
            font-size: clamp(10px, 1.3vmin, 16px);
            width: clamp(32px, 4vmin, 50px);
        }
        body.fullscreen .control-panel:hover {
            opacity: 1;
        }
        body.fullscreen .control-panel .info,
        body.fullscreen .control-panel .demo-result-panel,
        body.fullscreen .control-panel .key-hint {
            display: none;
        }
        body.fullscreen .fullscreen-toggle {
            background: rgba(255,255,255,0.1);
            border-color: #555;
            font-size: 13px;
        }

        /* ---- 隐藏旧水平置信度条及非全屏元素 ---- */
        #fs-conf-bar { display: none !important; }
        body.fullscreen .fullscreen-top { display: none; }
        body.fullscreen #fps-counter-float { display: none; }   /* 全屏顶栏已有 FPS */
    </style>
</head>
<body>
    <!-- 全屏切换按钮 -->
    <button id="btn-fullscreen" class="fullscreen-toggle" title="切换全屏模式">⛶ 全屏</button>
    <!-- FPS 显示 -->
    <span id="fps-counter-float" style="position:fixed;top:8px;left:12px;z-index:9999;font-family:monospace;font-size:13px;color:#4caf50;pointer-events:none;">-- FPS</span>

    <div class="container" id="main-container">
        <header><h1>🧠 脑控游戏平台</h1></header>
        <div class="game-area">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="800" height="800"></canvas>
                <div id="maze-controls" class="maze-controls-container" style="display:flex;">
                    <label>宽度(5~31奇数):</label>
                    <input type="number" id="mazeWidth" value="31" min="5" max="31" step="2">
                    <label>高度(5~31奇数):</label>
                    <input type="number" id="mazeHeight" value="31" min="5" max="31" step="2">
                    <button id="generateMazeBtn">✨ 生成新迷宫</button>
                </div>
            </div>
            <div class="control-panel">
                <div class="mode-selector">
                    <button id="mode-offline" class="active">📀 离线</button>
                    <button id="mode-online">⚡ 在线</button>
                </div>
                <div id="offline-panel">
                    <div class="game-selector">
                        <button id="btn-maze" class="active">🧩 迷宫</button>
                        <button id="btn-snake">🐍 贪吃蛇</button>
                        <button id="btn-racing">🏎️ 赛车</button>
                    </div>
                    <div class="demo-controls">
                        <button id="btn-demo-start" style="background:#4caf50;">🎮 开始演示</button>
                        <button id="btn-demo-stop" disabled style="background:#f44336;">⏹️ 停止</button>
                    </div>
                    <div class="demo-result-panel">
                        <h3>📊 演示结果</h3>
                        <div id="demo-log">等待开始演示...</div>
                        <div id="demo-summary">—</div>
                        <div id="demo-progress">—</div>
                    </div>
                </div>
                <div id="online-panel" style="display:none;">
                    <div class="game-selector">
                        <button id="btn-maze-online" class="active">🧩 迷宫</button>
                        <button id="btn-snake-online">🐍 贪吃蛇</button>
                        <button id="btn-racing-online">🏎️ 赛车</button>
                    </div>
                    <div class="realtime-controls">
                        <button id="btn-realtime-start" style="background:#4caf50;">▶ 实时解码</button>
                        <button id="btn-realtime-stop" disabled style="background:#f44336;">⏹️ 停止</button>
                    </div>
                    <div class="info" id="ws-status">🔌 WebSocket: 未连接</div>
                    <div class="eval-controls">
                        <button id="btn-eval-start">📊 在线评测</button>
                        <button id="btn-eval-stop" disabled>⏹️ 停止评测</button>
                        <div id="eval-info">就绪</div>
                    </div>
                    <div class="collect-controls" style="border-top:1px solid #555;padding-top:10px;margin-top:5px;">
                        <button id="btn-collect-start" style="background:#2196F3;">📥 数据采集</button>
                        <button id="btn-collect-stop" disabled style="background:#f44336;">⏹️ 停止</button>
                        <div id="collect-info" style="margin-top:4px;font-size:13px;color:#81d4fa;display:none;">采集就绪</div>
                    </div>
                </div>
                <div class="confidence-panel">
                    <h3>实时置信度</h3>
                    <div class="bars">
                        <div class="bar-item"><span class="dir">↑</span><div class="bar-container"><div id="bar-up" class="bar" style="width:0%"></div></div><span id="conf-up">0%</span></div>
                        <div class="bar-item"><span class="dir">↓</span><div class="bar-container"><div id="bar-down" class="bar" style="width:0%"></div></div><span id="conf-down">0%</span></div>
                        <div class="bar-item"><span class="dir">←</span><div class="bar-container"><div id="bar-left" class="bar" style="width:0%"></div></div><span id="conf-left">0%</span></div>
                        <div class="bar-item"><span class="dir">→</span><div class="bar-container"><div id="bar-right" class="bar" style="width:0%"></div></div><span id="conf-right">0%</span></div>
                    </div>
                    <div class="info">最后指令: <span id="last-cmd">—</span></div>
                </div>
                <div class="info">
                    💎 钻石: <span id="collectedDiamonds">0</span> / <span id="totalDiamonds">0</span><br>
                    🎯 得分: <span id="score">0</span>
                </div>
            </div>
        </div>
        <footer>MetaBCI 脑控游戏 | Prim 迷宫 | 贪吃蛇 | 赛车 | 离线/在线</footer>
    </div>

    <!-- 刺激 Canvas（独立于容器外，全屏时固定在底部） -->
    <canvas id="stimCanvas" width="800" height="180"></canvas>

    <!-- 全屏顶部栏（默认隐藏） -->
    <div class="fullscreen-header" style="display:none;">
        <h1>🧠 脑控游戏平台</h1>
        <div class="header-actions">
            <span id="fps-counter" style="font-family:monospace;font-size:13px;margin-right:12px;color:#4caf50;">-- FPS</span>
            <span id="fs-score" style="color:#ff9800;font-size:14px;margin-right:8px;"></span>
            <button id="btn-fullscreen-fs" class="fullscreen-toggle" style="position:static;">⛶ 退出全屏</button>
        </div>
    </div>


    <script src="game.js"></script>
</body>
</html>
